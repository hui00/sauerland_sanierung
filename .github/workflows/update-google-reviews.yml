name: Update Google Reviews

on:
  schedule:
    # Einmal im Monat: am 1. um 03:17 UTC
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Google reviews
        run: npm run reviews:update
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          GOOGLE_PLACE_ID: ${{ vars.GOOGLE_PLACE_ID }}
          GOOGLE_PLACE_QUERY: Sauerland Sanierung Bremke 17 58638 Iserlohn

      - name: Commit review data
        id: commit
        run: |
          if git diff --quiet -- src/data/google-reviews.json; then
            echo "No review changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/google-reviews.json
          git commit -m "Update Google reviews"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # A commit pushed with GITHUB_TOKEN does NOT auto-trigger the deploy
      # workflow, so we dispatch it explicitly when reviews actually changed.
      - name: Trigger Pages deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy-pages.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
